<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sicnova AI | Grok Engine</title>
    <style>
        :root { --primary: #00f2ff; --bg: #000; --text: #fff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'monospace', 'Courier New', Courier; overflow: hidden; }
        
        header { position: fixed; top: 0; width: 100%; padding: 20px; text-align: center; background: rgba(0,0,0,0.9); border-bottom: 1px solid #1a1a1a; z-index: 1000; }

        .screen { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }

        /* Botones Grok Style */
        .btn { display: block; width: 100%; max-width: 300px; padding: 22px; margin: 12px 0; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .btn-adult { background: var(--primary); color: #000; }
        .btn-minor { background: transparent; color: #fff; border: 1px solid #333; }
        .btn:active { background: #fff; }

        /* Consola de Procesamiento */
        .preview-container { width: 260px; height: 260px; border: 1px solid #333; position: relative; overflow: hidden; background: #050505; margin-bottom: 20px; }
        #user-capture { width: 100%; height: 100%; object-fit: cover; display: none; }
        .laser-scan { position: absolute; width: 100%; height: 2px; background: var(--primary); top: 0; display: none; animation: scan 1.5s infinite linear; box-shadow: 0 0 10px var(--primary); z-index: 10; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        /* Tarjeta de Prompt */
        .grok-card { background: #0a0a0a; border: 1px solid #222; padding: 20px; text-align: left; width: 90%; max-width: 400px; display: none; margin-bottom: 20px; }
        .grok-card span { color: var(--primary); font-size: 0.7rem; }
        .grok-card p { font-size: 0.85rem; color: #888; margin: 10px 0 0; }

        .back-btn { position: fixed; bottom: 30px; color: #444; background: none; border: none; cursor: pointer; text-decoration: underline; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header><b>SICNOVA AI</b> | NEURAL INTERFACE</header>

    <!-- PANTALLA 1: SELECTOR -->
    <div id="screen-start" class="screen active">
        <h1 style="font-weight: 200;">[ SELECT_ACCESS_MODE ]</h1>
        <button class="btn btn-adult" onclick="showScreen('screen-upload')">Adulto / Escaneo</button>
        <button class="btn btn-minor" onclick="startMinorFlow()">Menor de Edad</button>
    </div>

    <!-- PANTALLA 2: CAPTURA -->
    <div id="screen-upload" class="screen">
        <div class="preview-container">
            <div id="laser" class="laser-scan"></div>
            <img id="user-capture" src="">
            <div id="status-init" style="margin-top: 110px; color: #222;">WAITING_FOR_INPUT</div>
        </div>

        <input type="file" id="file-in" accept="image/*" capture="user" style="display:none" onchange="processImage(this)">
        <button class="btn btn-adult" id="btn-snap" onclick="document.getElementById('file-in').click()">Capturar Rostro</button>
        
        <div id="terminal" style="font-size: 0.7rem; color: var(--primary); margin-bottom: 20px;"></div>

        <div class="grok-card" id="grok-card">
            <span>PROMPT_GENERATED:</span>
            <p id="prompt-content"></p>
        </div>

        <button class="btn btn-adult" id="btn-jump" style="display:none" onclick="jumpToGrok()">Copiar y Abrir Grok</button>
        
        <button class="back-btn" onclick="location.reload()">TERMINAR_PROCESO</button>
    </div>

    <!-- PANTALLA 3: MENOR -->
    <div id="screen-minor" class="screen">
        <video id="vid-minor" controls playsinline style="width:100%; max-width:400px; border: 1px solid #222;">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>
        <button class="back-btn" onclick="location.reload()">VOLVER</button>
    </div>

    <script>
        const PROMPT_TEXT = "Actúa como una IA de animación avanzada. Procesa esta imagen que acabo de adjuntar y genera un avatar realista que se mueva y diga exactamente esto: 'Hola, soy el avatar digital de Sicnova para el Instituto Santo Reino. Mi gemelo digital ha sido sincronizado correctamente.'";

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startMinorFlow() {
            showScreen('screen-minor');
            document.getElementById('vid-minor').play();
        }

        function processImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('status-init').style.display = 'none';
                    const img = document.getElementById('user-capture');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById('laser').style.display = 'block';
                    document.getElementById('btn-snap').style.display = 'none';
                    
                    const term = document.getElementById('terminal');
                    const lines = ["> ANALYZING_FACIAL_MESH...", "> EXTRACTING_BIOMETRICS...", "> GENERATING_PROMPT..."];
                    let i = 0;
                    
                    const interval = setInterval(() => {
                        term.innerText = lines[i];
                        i++;
                        if (i >= lines.length) {
                            clearInterval(interval);
                            document.getElementById('grok-card').style.display = 'block';
                            document.getElementById('prompt-content').innerText = PROMPT_TEXT;
                            document.getElementById('btn-jump').style.display = 'block';
                        }
                    }, 1200);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function jumpToGrok() {
            // Copiar el texto para que el usuario solo tenga que dar a "Pegar" en Grok
            navigator.clipboard.writeText(PROMPT_TEXT).then(() => {
                alert("Prompt copiado. En Grok: Adjunta tu foto y dale a 'Pegar'.");
                
                // Intentamos abrir la App de Grok/X mediante el esquema de URL
                // Si Grok tiene app propia el link sería grok:// o similar, 
                // actualmente se accede mediante x://grok
                window.location.href = "twitter://grok"; 
                
                // Fallback por si no tiene la app instalada
                setTimeout(() => {
                    window.location.href = "https://x.com/i/grok";
                }, 1500);
            });
        }
    </script>
</body>
</html>
