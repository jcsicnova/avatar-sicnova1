<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sicnova AI | Santo Reino Bridge</title>
    <style>
        :root { --primary: #00f2ff; --bg: #000; --accent: #7000ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        header { position: fixed; top: 0; width: 100%; padding: 20px; text-align: center; background: rgba(0,0,0,0.9); border-bottom: 1px solid #222; z-index: 1000; backdrop-filter: blur(10px); }

        .screen { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }

        .btn { display: block; width: 100%; max-width: 300px; padding: 22px; margin: 12px 0; border: none; border-radius: 16px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-adult { background: linear-gradient(90deg, var(--primary), var(--accent)); color: #000; }
        .btn-minor { background: #1a1a1a; color: #fff; border: 1px solid #333; }

        /* Contenedor Foto */
        .preview-box { width: 250px; height: 250px; border-radius: 20px; border: 1px solid #333; position: relative; overflow: hidden; margin-bottom: 20px; background: #080808; }
        #user-photo { width: 100%; height: 100%; object-fit: cover; display: none; }
        .laser { position: absolute; width: 100%; height: 4px; background: var(--primary); top: 0; display: none; animation: scan 2s infinite ease-in-out; box-shadow: 0 0 15px var(--primary); z-index: 10; }
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        /* Info Box */
        .prompt-card { background: #111; padding: 20px; border-radius: 15px; border-left: 4px solid var(--primary); text-align: left; width: 90%; max-width: 400px; margin-bottom: 20px; display: none; }
        .prompt-card small { color: var(--primary); text-transform: uppercase; font-size: 0.7rem; }
        .prompt-card p { margin: 10px 0 0; font-size: 0.9rem; color: #ccc; font-style: italic; }

        .back-btn { position: fixed; bottom: 30px; color: #444; background: none; border: none; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <header><b>SICNOVA AI</b> | IES SANTO REINO</header>

    <!-- 1. SELECCIÓN -->
    <div id="screen-home" class="screen active">
        <h1 style="font-weight: 200;">Puente IA <br><b style="color:var(--primary)">Sicnova & Grok</b></h1>
        <button class="btn btn-adult" onclick="showScreen('screen-capture')">Adulto (Iniciar)</button>
        <button class="btn btn-minor" onclick="startMinor()">Menor de Edad</button>
    </div>

    <!-- 2. CAPTURA Y ESCANEO -->
    <div id="screen-capture" class="screen">
        <div class="preview-box">
            <div id="laser" class="laser"></div>
            <img id="user-photo" src="">
            <div id="placeholder" style="margin-top:100px; color:#222;">LISTO PARA ESCANEO</div>
        </div>
        
        <input type="file" id="cam-input" accept="image/*" capture="user" style="display:none" onchange="processToGrok(this)">
        <button class="btn btn-adult" id="snap-btn" onclick="document.getElementById('cam-input').click()">Hacer Foto</button>
        
        <div id="status" style="color: var(--primary); font-family: monospace; font-size: 0.8rem; margin-top: 10px;"></div>

        <!-- Instrucciones para Grok -->
        <div class="prompt-card" id="prompt-card">
            <small>Prompt Generado para Grok:</small>
            <p id="prompt-text">"Anima esta foto para que la persona diga: Hola, soy un avatar creado por Sicnova para el Instituto Santo Reino..."</p>
        </div>

        <button class="btn btn-adult" id="grok-btn" style="display:none" onclick="openGrok()">Copiar Prompt y Abrir Grok</button>

        <button class="back-btn" onclick="location.reload()">Cancelar</button>
    </div>

    <!-- 3. MENOR -->
    <div id="screen-minor" class="screen">
        <video id="minor-vid" controls playsinline style="width:100%; max-width:400px; border-radius:20px;">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>
        <button class="back-btn" onclick="location.reload()">Volver</button>
    </div>

    <script>
        // AQUÍ PONES LAS FRASES CONCRETAS QUE QUIERES QUE DIGA
        const fraseParaGrok = "Anima esta foto de cuerpo completo. Quiero que la persona se mueva de forma realista y diga exactamente estas frases: 'Hola, soy el avatar digital del Instituto Santo Reino, creado gracias a la tecnología de Sicnova. Mi gemelo digital ha sido generado con éxito.'";

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startMinor() {
            showScreen('screen-minor');
            document.getElementById('minor-vid').play();
        }

        function processToGrok(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Mostrar previa
                    document.getElementById('placeholder').style.display = 'none';
                    const img = document.getElementById('user-photo');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    
                    document.getElementById('laser').style.display = 'block';
                    document.getElementById('snap-btn').style.display = 'none';
                    const status = document.getElementById('status');

                    // Simular Proceso Neuronal
                    status.innerText = "EXTRAYENDO METADATOS...";
                    setTimeout(() => status.innerText = "GENERANDO PROMPT PARA GROK...", 1500);
                    setTimeout(() => {
                        status.style.display = 'none';
                        document.getElementById('prompt-card').style.display = 'block';
                        document.getElementById('prompt-text').innerText = fraseParaGrok;
                        document.getElementById('grok-btn').style.display = 'block';
                    }, 3000);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function openGrok() {
            // 1. Copiar el prompt al portapapeles
            navigator.clipboard.writeText(fraseParaGrok).then(() => {
                alert("Prompt copiado. Ahora adjunta tu foto en Grok y pega el texto.");
                
                // 2. Intentar abrir Grok (X)
                // Usamos el deep link de Grok en X
                window.location.href = "https://x.com/i/grok"; 
            });
        }
    </script>
</body>
</html>
